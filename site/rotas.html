<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Páscoa 2026 · Entregas</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥚</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'dark')</script>
  <base href="../">
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Barra de controles ── */
    .route-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      width: 100%;
    }
    .route-controls select {
      flex-shrink: 0;
    }
    .route-stat {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.45rem;
      padding: 0.5rem 0.85rem;
      background: var(--surface2);
      border-radius: var(--r);
      font-size: 0.82rem;
      color: var(--text2);
      white-space: nowrap;
      flex: 1;
    }
    .route-stat strong {
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }

    /* ── Mapa ── */
    #map {
      width: 100%;
      height: 460px;
      border-radius: var(--r);
      border: 1px solid var(--border);
      z-index: 0;
      margin-bottom: 1rem;
    }
    @media (max-width: 700px) {
      #map { height: 300px; }
    }

    /* ── Grid de entregas ── */
    .stop-grid {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 0.75rem;
    }
    .stop-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.65rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .stop-item:hover { border-color: var(--accent); }
    .stop-item.stop-origin, .stop-item.stop-no-coord { background: var(--surface2); cursor: default; }
    .stop-item.stop-day-label {
      grid-column: 1 / -1;
      background: transparent;
      border-color: transparent;
      cursor: default;
      padding: 0.2rem 0;
      font-size: 0.72rem;
      font-family: 'DM Mono', monospace;
      color: var(--text3);
      letter-spacing: 0.04em;
    }
    .stop-num {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
    }
    .stop-origin .stop-num { background: var(--text3); }
    .stop-no-coord .stop-num { background: var(--text3); }
    .stop-info { flex: 1; min-width: 0; }
    .stop-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stop-addr { color: var(--text2); font-size: 0.75rem; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stop-recheio { color: var(--accent); font-size: 0.72rem; }
    .stop-faltante { color: #4caf50; font-size: 0.72rem; font-weight: 600; }
    .stop-recheio-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .stop-faltante-total { display: flex; justify-content: space-between; align-items: center; color: #4caf50; font-size: 0.78rem; font-weight: 700; margin-top: 4px; padding-top: 4px; border-top: 1px solid var(--border); }
    .stop-ordem { margin-top: 3px; display: flex; flex-direction: column; gap: 1px; }
    .stop-ordem + .stop-ordem { border-top: 1px solid var(--border); padding-top: 3px; margin-top: 3px; }
    /* Leaflet popup dark mode */
    [data-theme="dark"] .leaflet-popup-content-wrapper,
    [data-theme="dark"] .leaflet-popup-tip { background: #2e2a22; color: #f0ede6; }
    [data-theme="dark"] .leaflet-popup-content-wrapper { border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body>
