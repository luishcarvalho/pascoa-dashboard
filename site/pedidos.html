<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Páscoa 2026 · Pedidos</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥚</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'dark')</script>
  <base href="../">
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Select dropdown (mesmo estilo que #daySelect no styles.css) ── */
    #daySelectPedidos {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      height: 38px;
      padding: 0 36px 0 14px;
      border-radius: 20px;
      border: 0.5px solid var(--border2);
      background-color: var(--surface);
      color: var(--text2);
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--text3) 50%),
        linear-gradient(135deg, var(--text3) 50%, transparent 50%);
      background-position: calc(100% - 16px) 50%, calc(100% - 10px) 50%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      transition: border-color 0.15s;
    }
    #daySelectPedidos:hover { border-color: var(--border2); }
    #daySelectPedidos:focus { border-color: rgba(0,0,0,0.3); outline: none; }

    /* ── Scrollbar horizontal da tabela ── */
    .pedidos-wrap::-webkit-scrollbar       { height: 5px; }
    .pedidos-wrap::-webkit-scrollbar-track { background: var(--surface2); border-radius: 3px; }
    .pedidos-wrap::-webkit-scrollbar-thumb { background: var(--border2);  border-radius: 3px; }
    .pedidos-wrap::-webkit-scrollbar-thumb:hover { background: var(--text3); }
    .pedidos-wrap { scrollbar-width: thin; scrollbar-color: var(--border2) var(--surface2); }

    /* ── Seções de cidade ── */
    .cidade-section {
      margin-bottom: 2.5rem;
    }

    .cidade-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      font-weight: 500;
      margin: 1.5rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1.5px solid var(--accent);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .cidade-badge {
      font-size: 0.72rem;
      font-weight: 500;
      background: var(--surface2);
      color: var(--text2);
      border-radius: 999px;
      padding: 0.1em 0.6em;
      text-transform: none;
      letter-spacing: 0;
    }

    /* ── Seções de turno ── */
    .turno-section {
      margin-bottom: 1.5rem;
      padding-left: 0.75rem;
      border-left: 2px solid var(--border2);
    }

    .turno-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 0.75rem;
    }

    /* ── Seção entrega/retirada ── */
    .tipo-section {
      margin-bottom: 1rem;
    }

    .tipo-label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.75rem;
    }

    .tipo-badge {
      font-size: 0.72rem;
      color: var(--text3);
    }

    /* ── Tabela de pedidos ── */
    .pedidos-wrap {
      overflow-x: auto;
      border-radius: var(--r);
      border: 1px solid var(--border);
      margin-bottom: 0.5rem;
    }

    .pedidos-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      white-space: nowrap;
    }

    /* Override globais da tabela que afetam a última coluna */
    .pedidos-table td:last-child,
    .pedidos-table th:last-child {
      text-align: left;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
    }

    .pedidos-table th {
      background: var(--surface2);
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      font-weight: 400;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.5rem 0.7rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .pedidos-table td {
      padding: 0.45rem 0.7rem;
      border-bottom: 0.5px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }

    .pedidos-table tr:last-child td { border-bottom: none; }

    .pedidos-table tbody tr:hover td { background: var(--surface2); }

    .pedidos-table tr.group-alt td {
      background: color-mix(in srgb, var(--surface2) 45%, transparent);
    }
    .pedidos-table tr.group-alt:hover td { background: var(--surface2); }

    /* ── Badges ── */
    .badge-entrega {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.1em 0.5em;
      border-radius: 999px;
      background: color-mix(in srgb, #3b82f6 18%, transparent);
      color: #3b82f6;
    }
    .badge-retirada {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.1em 0.5em;
      border-radius: 999px;
      background: color-mix(in srgb, #f59e0b 18%, transparent);
      color: #f59e0b;
    }
    .badge-infantil {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.1em 0.5em;
      border-radius: 999px;
      background: color-mix(in srgb, #ec4899 18%, transparent);
      color: #ec4899;
    }

    .faltante-zero { color: var(--text3); }
    .faltante-pos  { color: var(--red, #f87171); font-weight: 600; }

    .pedido-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--text2);
    }

    /* ── Status bar com stats inline ── */
    .pedidos-bar-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .day-summary {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .day-stat {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.65rem;
      background: var(--surface2);
      border-radius: var(--r);
      font-size: 0.78rem;
      color: var(--text2);
    }

    .day-stat strong {
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }

    /* ── Observação colapsável ── */
    .obs-cell {
      max-width: 220px;
      white-space: normal;
      font-size: 0.78rem;
    }

    .obs-details { cursor: pointer; }

    .obs-summary {
      list-style: none;
      color: var(--text2);
      font-size: 0.78rem;
      line-height: 1.4;
      cursor: pointer;
    }

    .obs-summary::-webkit-details-marker { display: none; }
    .obs-summary::after        { content: " ▸"; font-size: 0.65rem; color: var(--text3); }
    .obs-details[open] .obs-summary::after { content: " ▾"; }

    .obs-full {
      display: block;
      margin-top: 0.25rem;
      color: var(--text);
      font-size: 0.78rem;
      line-height: 1.4;
      white-space: normal;
    }

    .obs-text { color: var(--text2); font-size: 0.78rem; }

    .priv {
      color: var(--text3);
      letter-spacing: 0.08em;
    }

    .empty-day {
      color: var(--text3);
      font-size: 0.9rem;
      padding: 2rem 0;
      text-align: center;
    }

    /* ── Impressão ── */
    @media print {
      @page { margin: 1.5cm 1.8cm; }

      body, .page { background: #fff !important; color: #000 !important; }
      .page { padding: 0 !important; max-width: none !important; }

      /* Ocultar elementos de UI e cabeçalho estático */
      .header, nav.tab-nav, .status-bar, .site-footer,
      #btnPrint, #btnTheme, #btnRefresh, .header-auth,
      #printHeader, .cidade-label { display: none !important; }

      /* Quebra de página antes de cada turno (exceto o primeiro — aplicada via JS) */
      .print-page-break { page-break-before: always; break-before: page; }

      /* Cabeçalho por turno (injetado via JS) */
      .turno-page-header { margin-bottom: 1rem; }
      .turno-page-header-top {
        display: flex; align-items: baseline; gap: 0.75rem;
        border-bottom: 2px solid #000; padding-bottom: 0.35rem; margin-bottom: 0.6rem;
      }
      .print-header-title {
        font-family: 'DM Mono', monospace; font-size: 1rem; font-weight: 600;
        color: #000; text-transform: uppercase; letter-spacing: 0.08em;
      }
      .print-header-sub { font-size: 0.78rem; color: #555; }
      .turno-page-cidade {
        font-family: 'DM Mono', monospace; font-size: 0.72rem; font-weight: 600;
        letter-spacing: 0.1em; text-transform: uppercase; color: #000; margin-bottom: 0.4rem;
      }

      /* Seções */
      .cidade-section { margin-bottom: 0; }
      .turno-section { border-left: 2px solid #bbb !important; }
      .turno-label { page-break-after: avoid; break-after: avoid; color: #333 !important; }
      .tipo-label { page-break-after: avoid; break-after: avoid; }
      .pedidos-table tr { page-break-inside: avoid; break-inside: avoid; }

      /* Tabela */
      .pedidos-wrap { overflow: visible !important; border: 1px solid #ccc !important; }
      .pedidos-table { font-size: 9px !important; white-space: normal !important; }
      .pedidos-table th { background: #f0f0f0 !important; color: #333 !important; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .pedidos-table td { color: #000 !important; border-bottom: 0.5px solid #ddd !important; }
      .pedidos-table tr.group-alt td { background: #f7f7f7 !important; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .pedidos-table tbody tr:hover td { background: transparent !important; }

      /* Badges */
      .badge-entrega { background: #dbeafe !important; color: #1d4ed8 !important; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .badge-retirada { background: #fef3c7 !important; color: #92400e !important; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .badge-infantil { background: #fce7f3 !important; color: #9d174d !important; print-color-adjust: exact; -webkit-print-color-adjust: exact; }

      /* Valores em vermelho — tamanho explícito para não herdar tamanho maior */
      .faltante-pos { font-size: 9px !important; color: #c00 !important; font-weight: 600; }
      .faltante-zero { font-size: 9px !important; }

      /* Expandir observações colapsadas */
      details { display: block !important; }
      details > summary { display: none !important; }
      .obs-full { display: block !important; color: #000 !important; }

      /* Texto mascarado */
      .priv { color: #aaa !important; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header-left">
        <h1>Dashboard · Pedidos</h1>
        <p class="header-sub">Pedidos de entrega e retirada por dia e turno</p>
      </div>
      <div class="actions">
        <div class="header-auth" id="header-auth" style="display:none">
          <div class="auth-input-wrap">
            <input type="password" id="header-auth-input" placeholder="Senha" autocomplete="current-password" />
            <span id="header-auth-msg" class="auth-msg"></span>
          </div>
          <button id="header-auth-btn">Desbloquear</button>
          <span id="header-auth-icon">🔒</span>
        </div>
        <div class="actions-right">
          <div class="actions-btns">
            <button id="btnTheme" title="Alternar tema" aria-label="Alternar modo claro/escuro">☀</button>
            <button id="btnPrint" title="Imprimir pedidos do dia">Imprimir</button>
            <button id="btnRefresh">Atualizar agora</button>
          </div>
          <p class="header-ts" id="lastUpdated">—</p>
        </div>
      </div>
    </header>

    <nav class="tab-nav">
      <a href="metricas/" class="tab-link">Métricas</a>

    </nav>

    <div class="status-bar">
      <span id="status-pedidos"></span>
      <div class="pedidos-bar-right">
        <div id="pedidos-day-stats" class="day-summary"></div>
        <select id="daySelectPedidos"></select>
      </div>
    </div>

    <div class="print-header" id="printHeader" style="display:none">
      <div class="print-header-title">Pedidos · <span id="printDia"></span></div>
      <div class="print-header-sub">Páscoa 2026</div>
    </div>

    <div id="pedidos-content"></div>

    <footer class="site-footer">

  </div>

  <script src="auth.js"></script>

</body>
</html>
