name: Build & Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 12 * * *"   # diariamente às 12:00 UTC

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      # ✅ Copia o conteúdo do site/ para dist/ e cria estrutura de URLs limpas
      - name: Prepare dist with static site
        run: |
          rm -rf dist
          mkdir -p dist
          rsync -av --delete site/ dist/
          mkdir -p dist/data
          mkdir -p dist/metricas dist/predicao dist/rotas dist/financeiro dist/pedidos
          cp dist/metricas.html dist/metricas/index.html
          cp dist/predicao.html dist/predicao/index.html
          cp dist/rotas.html dist/rotas/index.html
          cp dist/financeiro.html dist/financeiro/index.html
          cp dist/pedidos.html dist/pedidos/index.html

      - name: Build metrics.json
        run: python scripts/build_metrics.py

      - name: Build prediction.json
        run: python scripts/build_prediction.py

      - name: Build routes.json
        run: python scripts/geocode_addresses.py

      - name: Commit geocache.json atualizado
        run: |
          git config user.name "Luís Henrique"
          git config user.email "75873659+luishcarvalho@users.noreply.github.com"
          git add data/geocache.json
          if git diff --cached --quiet; then
            echo "geocache.json sem mudanças, nada a commitar."
          else
            git commit -m "chore: atualiza geocache.json [skip ci]"
            git push
          fi

      - name: Build financeiro.json
        run: python scripts/build_financeiro.py

      - name: Build pedidos.json
        run: python scripts/build_pedidos.py

      - name: Inject auth hash
        run: |
          sed -i "s/HASH_PLACEHOLDER/${{ secrets.AUTH_HASH }}/" dist/auth.js

      - name: Validate dist/data (fail if NaN)
        run: |
          echo "== dist =="
          ls -lah dist
          echo "== dist/data =="
          ls -lah dist/data
          echo "== head metrics.json =="
          head -n 40 dist/data/metrics.json
          echo "== check NaN =="
          if grep -R "NaN" -n dist/data/metrics.json; then
            echo "ERROR: metrics.json contains NaN (invalid JSON for browser)."
            exit 1
          else
            echo "OK: no NaN found."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Limpar runs antigos (manter últimos 5)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run list --repo ${{ github.repository }} --limit 100 --json databaseId,status \
            -q '[.[] | select(.status == "completed")] | .[5:] | .[].databaseId' \
            | xargs -r -I {} gh run delete {} --repo ${{ github.repository }}
